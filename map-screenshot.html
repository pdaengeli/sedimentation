<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Map Screenshot Helper</title>
<link rel="stylesheet" href="{{ '/assets/lib/leaflet/leaflet.css' | relative_url }}">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  #map { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>
<script src="{{ '/assets/lib/leaflet/leaflet.js' | relative_url }}"></script>
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
<script>
  var damCenter = [36.93, -111.48];
  var map = L.map('map', {
    center: damCenter,
    zoom: 10,
    zoomControl: true,
    dragging: true,
    scrollWheelZoom: true
  });

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri'
  }).addTo(map);

  L.esri.featureLayer({
    url: 'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/LakePowellBoundary/FeatureServer/0',
    style: function () {
      return { color: '#0066cc', weight: 2, fillOpacity: 0.3 };
    }
  }).addTo(map);

  L.marker(damCenter).addTo(map).bindPopup('Glen Canyon Dam');
</script>
</body>
</html>
