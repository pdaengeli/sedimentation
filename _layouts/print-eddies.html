<!DOCTYPE html>
<!--
  PRINT-EDDIES LAYOUT — Standalone (no default.html inheritance)
  ==============================================================
  Renders the user's current Eddies CYOA session as a printable document.

  DATA FLOW:
    1. eddies-cyoa-js.html copies loadedSections (array of {tributarySlug, id})
       to localStorage['eddies-print-session'] before navigating here.
    2. This page fetches /assets/data/tributaries.json (built by Jekyll).
    3. For each section in the stored session, it renders the matching
       html_content from the JSON.
    4. window.PagedPolyfill.preview() paginates the rendered content.

  Empty state: if no session data exists, shows a link back to Eddies.

  URL PARAMETERS:
    ?format=letter|a4|69   Page size (persisted to localStorage)

  ACCESSIBILITY: same approach as print.html — see that file for details.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PDF metadata: Chrome uses <title> for document title, <meta name="author"> for author -->
  <title>My Eddies Journey — Sedimentation: An Archive of Glen Canyon</title>
  <meta name="author" content="Hannah Green">
  <meta name="description" content="A personal journey through Sedimentation: An Archive of Glen Canyon, generated by Eddies">

  <!-- Prevent Paged.js from auto-rendering before we register our accessibility handler -->
  <script>window.PagedConfig = { auto: false };</script>

  <!-- Google Fonts: Spectral + Inconsolata -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;600&family=Spectral:ital,wght@0,200;0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">

  <!-- Print-only CSS (standalone — NOT cb.css which loads globally and would break the live site) -->
  <link rel="stylesheet" href="{{ '/assets/css/print.css' | relative_url }}">

  <!-- Format override: reads ?format= URL param and injects @page size rule -->
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var format = params.get('format') || localStorage.getItem('print-format') || 'letter';
      var sizes = { letter: '8.5in 11in', a4: '210mm 297mm', '69': '6in 9in' };
      if (sizes[format]) {
        document.head.insertAdjacentHTML('beforeend',
          '<style>@page { size: ' + sizes[format] + '; }</style>');
      }
      window._printFormat = format;
    })();
  </script>
</head>
<body class="has-print-bar print-body">

  <!-- Screen-only control bar — hidden at print time via CSS -->
  <nav class="print-control-bar" aria-label="Print controls">
    <span class="print-control-title">My Eddies Journey</span>

    <a href="{{ '/print/' | relative_url }}" class="print-back-link">← Print Hub</a>

    <div class="format-selector" role="group" aria-label="Page size">
      <button class="format-btn" data-format="letter" aria-pressed="false">Letter</button>
      <button class="format-btn" data-format="a4" aria-pressed="false">A4</button>
      <button class="format-btn" data-format="69" aria-pressed="false">6×9″</button>
    </div>

    <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
  </nav>

  <!-- Main content — landmark used by screen readers to skip to content -->
  <main id="print-eddies-content" aria-label="My Eddies Journey"></main>

  <!-- Format selector button state -->
  <script>
    (function() {
      var currentFormat = window._printFormat || 'letter';
      document.querySelectorAll('.format-btn').forEach(function(btn) {
        var isActive = btn.dataset.format === currentFormat;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        btn.addEventListener('click', function() {
          var fmt = this.dataset.format;
          localStorage.setItem('print-format', fmt);
          var url = new URL(window.location.href);
          url.searchParams.set('format', fmt);
          window.location.href = url.toString();
        });
      });
    })();
  </script>

  <!-- Session rendering script -->
  <script>
  (function() {
    'use strict';

    var container = document.getElementById('print-eddies-content');
    var baseUrl = '{{ "/" | relative_url }}';

    // ——— Read session from localStorage ———
    var rawSession = localStorage.getItem('eddies-print-session');

    if (!rawSession) {
      renderEmptyState();
      return;
    }

    var session;
    try {
      session = JSON.parse(rawSession);
    } catch(e) {
      renderEmptyState();
      return;
    }

    if (!session.sections || session.sections.length === 0) {
      renderEmptyState();
      return;
    }

    // ——— Fetch tributaries data ———
    fetch(baseUrl + 'assets/data/tributaries.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        renderSession(session, data);
      })
      .catch(function(err) {
        console.error('Failed to load tributaries.json:', err);
        container.innerHTML = '<p style="padding:2rem;font-family:monospace;">Error loading section data. Please try again.</p>';
      });

    // ——— Render the session ———
    function renderSession(session, tributariesData) {
      var sections = session.sections;
      var generatedAt = session.generatedAt ? new Date(session.generatedAt) : new Date();
      var dateStr = generatedAt.toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });

      // Build a lookup map: tributarySlug → {id → section}
      // tributaries.json actual structure: { "tributaries": [ { slug, sections: [...] } ] }
      var sectionMap = {};
      var tributaryList = Array.isArray(tributariesData)
        ? tributariesData
        : (tributariesData.tributaries || []);

      tributaryList.forEach(function(trib) {
        if (!sectionMap[trib.slug]) sectionMap[trib.slug] = {};
        if (trib.sections && Array.isArray(trib.sections)) {
          trib.sections.forEach(function(sec) {
            sectionMap[trib.slug][sec.id] = Object.assign({}, sec, {
              tributaryTitle: trib.title
            });
          });
        }
      });

      // Resolve sections from the session
      var resolvedSections = [];
      sections.forEach(function(s) {
        var sec = sectionMap[s.tributarySlug] && sectionMap[s.tributarySlug][s.id];
        if (sec) {
          resolvedSections.push({
            tributarySlug: s.tributarySlug,
            id: s.id,
            title: sec.heading || sec.title || '',
            content: sec.html_content || sec.content || '',
            tributaryTitle: sec.tributaryTitle || s.tributarySlug
          });
        }
      });

      // Build section list for title page (used in <ol> — accessible list)
      var sectionListItems = resolvedSections.map(function(s) {
        return '<li>' + (s.tributaryTitle || s.tributarySlug) +
               (s.title ? ': ' + s.title : '') + '</li>';
      }).join('');

      // ——— Title page ———
      // Ornament is aria-hidden — purely decorative circles, not content
      var html = '<div class="print-eddies-title-page">';
      html += '<div class="print-ornament" aria-hidden="true">';
      html += '<svg width="80" height="16" viewBox="0 0 80 16" xmlns="http://www.w3.org/2000/svg"' +
              ' role="presentation" focusable="false">';
      html += '<circle cx="14" cy="8" r="5" fill="#CD853F" opacity="0.6"/>';
      html += '<circle cx="40" cy="8" r="4" fill="#D2691E" opacity="0.5"/>';
      html += '<circle cx="66" cy="8" r="5" fill="#DEB887" opacity="0.55"/>';
      html += '</svg></div>';
      html += '<h1 class="print-essay-title">My Journey Through Sedimentation</h1>';
      html += '<p class="eddies-print-subtitle">from <em>Eddies</em> — a personal archive of Glen Canyon</p>';
      html += '<p class="eddies-print-date">' + dateStr + '</p>';
      // Accessible ordered list of sections visited
      html += '<ol class="eddies-section-list" aria-label="Sections in this journey">' + sectionListItems + '</ol>';
      html += '</div>';

      // ——— Sections ———
      resolvedSections.forEach(function(sec, i) {
        html += '<div class="print-eddies-section print-essay-body">';

        if (i > 0) {
          // Decorative divider — aria-hidden so AT doesn't announce it
          html += '<hr class="eddies-section-divider" aria-hidden="true">';
        }

        if (sec.tributaryTitle || sec.tributarySlug) {
          html += '<p class="eddies-section-source">' +
            (sec.tributaryTitle || sec.tributarySlug) + '</p>';
        }

        if (sec.title) {
          html += '<h2>' + sec.title + '</h2>';
        }

        html += sec.content;
        html += '</div>';
      });

      container.innerHTML = html;

      // ——— Post-render accessibility prep ———
      // (mirrors the prep in print.html for consistent PDF tag tree)

      // Footnotes: DPUB-ARIA role on section; relabel heading to "Notes".
      // Do NOT set role="doc-endnote" on <li> — generates non-standard PDF tags.
      container.querySelectorAll('section.footnotes').forEach(function(sec) {
        sec.setAttribute('role', 'doc-endnotes');
        var h = sec.querySelector('h2');
        if (h) h.textContent = 'Notes';
        sec.querySelectorAll('li').forEach(function(li) { li.removeAttribute('role'); });
      });

      // Footnote back-links: remove from DOM entirely (useless in print;
      // display:none still creates entries in the PDF tag tree)
      container.querySelectorAll('a.reversefootnote').forEach(function(a) {
        a.parentNode.removeChild(a);
      });

      // Footnote superscript links: add accessible label
      container.querySelectorAll('sup[id^="fnref"] a').forEach(function(a) {
        var num = a.textContent.trim();
        if (num) a.setAttribute('aria-label', 'footnote ' + num);
      });

      // Image links (spotlight): remove href so PDF doesn't create broken links
      container.querySelectorAll('a.spotlight.gallery-img').forEach(function(a) {
        var img = a.querySelector('img');
        if (img && img.alt) {
          a.setAttribute('aria-label', img.alt);
        }
        a.removeAttribute('href');
        a.removeAttribute('data-download');
      });

      // Ensure every <img> has an alt attribute — required for tagged PDF Figure tags
      container.querySelectorAll('img').forEach(function(img) {
        if (!img.hasAttribute('alt')) {
          img.setAttribute('alt', '');
        }
      });

      // Replace <figure> → <div class="figure"> so img alt is the only accessible
      // name in the PDF tag tree (see print.html for full rationale).
      container.querySelectorAll('figure').forEach(function(fig) {
        var div = document.createElement('div');
        div.className = fig.className || 'figure';
        div.innerHTML = fig.innerHTML;
        fig.parentNode.replaceChild(div, fig);
      });
      container.querySelectorAll('figcaption').forEach(function(cap) {
        var div = document.createElement('div');
        div.className = (cap.className ? cap.className + ' ' : '') + 'figure-caption';
        div.innerHTML = cap.innerHTML;
        cap.parentNode.replaceChild(div, cap);
      });

      // Section-end ornaments before any choice containers
      container.querySelectorAll('.trib-choice-container').forEach(function(el) {
        var ornament = document.createElement('div');
        ornament.className = 'section-end-ornament';
        ornament.setAttribute('aria-hidden', 'true');
        ornament.innerHTML = '<svg width="60" height="12" viewBox="0 0 60 12"' +
          ' xmlns="http://www.w3.org/2000/svg" role="presentation" focusable="false">' +
          '<circle cx="10" cy="6" r="3.5" fill="#CD853F" opacity="0.6"/>' +
          '<circle cx="30" cy="6" r="2.5" fill="#D2691E" opacity="0.5"/>' +
          '<circle cx="50" cy="6" r="3.5" fill="#DEB887" opacity="0.55"/>' +
          '</svg>';
        el.parentNode.insertBefore(ornament, el);
      });

      // ——— Trigger Paged.js after content is in DOM ———
      // A11yHandler must be registered BEFORE preview() is called.
      // Paged.js script is loaded after this block — poll until available.
      function tryPreview() {
        if (window.Paged && window.PagedPolyfill &&
            typeof window.PagedPolyfill.preview === 'function') {

          class EddiesA11yHandler extends Paged.Handler {
            afterRendered(pages) {
              pages.forEach(function(page) {
                // Mark margin boxes (running headers, page numbers) as pagination
                // artifacts — excluded from the PDF tag tree per PDF/UA.
                page.element.querySelectorAll('.pagedjs_margin').forEach(function(m) {
                  m.setAttribute('aria-hidden', 'true');
                });
                page.element.querySelectorAll('.pagedjs_margin-content').forEach(function(mc) {
                  mc.setAttribute('aria-hidden', 'true');
                });
                page.element.setAttribute('role', 'none');
              });

              var source = document.getElementById('print-eddies-content');
              if (source) source.setAttribute('aria-hidden', 'true');
            }
          }

          Paged.registerHandlers(EddiesA11yHandler);
          window.PagedPolyfill.preview();
        } else {
          setTimeout(tryPreview, 100);
        }
      }

      // Give images a moment to start loading before Paged.js measures layout
      setTimeout(tryPreview, 300);
    }

    // ——— Empty state ———
    function renderEmptyState() {
      container.innerHTML =
        '<div class="print-empty-state">' +
        '<div style="margin-bottom:2rem;opacity:0.5;" aria-hidden="true">' +
        '<svg width="60" height="12" viewBox="0 0 60 12" xmlns="http://www.w3.org/2000/svg"' +
        ' role="presentation" focusable="false">' +
        '<circle cx="10" cy="6" r="3.5" fill="#CD853F" opacity="0.6"/>' +
        '<circle cx="30" cy="6" r="2.5" fill="#D2691E" opacity="0.5"/>' +
        '<circle cx="50" cy="6" r="3.5" fill="#DEB887" opacity="0.55"/>' +
        '</svg></div>' +
        '<h2>No journey to print</h2>' +
        '<p>Visit <a href="' + baseUrl + 'eddies/">Eddies</a> to begin your journey,' +
        ' then use the print button to save it here.</p>' +
        '</div>';
    }

  })();
  </script>

  <!-- Paged.js CDN — loads after inline script runs.
       PagedConfig.auto=false (set in <head>) prevents auto-render
       so we can register our accessibility handler first. -->
  <script src="https://unpkg.com/pagedjs/dist/paged.legacy.polyfill.js"></script>

</body>
</html>
